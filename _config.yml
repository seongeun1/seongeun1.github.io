# GLAS - JEKYLL Theme/Blog
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.
#FOR MOE INFOS, CHECK OUT THE   - organisers.yml file 
# Site settings
title: Invitation from Parks
#What is the name of the events or talks you would like to host? (Example Brownbags, Talks, Lighting Talks)
event_label: Events

description: > # "
  Wedding Invitation

baseurl: "" # the subpath of your site, e.g. /blog
url: "http://spaceg.github.io" # the base hostname & protocol for your site
repository : "seongeun1/comments"
#These settings might be able to go?
author: Seongeun

# Build settings
markdown: kramdown
comments:
  provider      : "utterances"
  utterances :
    theme       : "github-light"
    issue_term  : "pathname"
#Have to show future posts for future events.
future: true

permalink: /event/:title.html

#change your port on localhost
port: 8000


